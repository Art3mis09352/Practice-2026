services:
  postgres:
    image: postgres:18
    container_name: practice_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Practise/Dockerfile
      args:
        BUILD_CONFIGURATION: Release
    container_name: practice_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "10000:10000"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      PORT: 10000

      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Database=${POSTGRES_DB}

      Cors__AllowedOrigins__0: ${Cors__AllowedOrigins__0}
      Cors__AllowedOrigins__1: ${Cors__AllowedOrigins__1}
      Cors__AllowedOrigins__2: ${Cors__AllowedOrigins__2}
      Cors__AllowedOrigins__3: ${Cors__AllowedOrigins__3}

      Storage__Endpoint: ${STORAGE_ENDPOINT}
      Storage__AccessKey: ${STORAGE_ACCESS_KEY}
      Storage__SecretKey: ${STORAGE_SECRET_KEY}
      Storage__UseSsl: ${STORAGE_USE_SSL}
      Storage__PublicPhotosBucket: ${STORAGE_PUBLIC_PHOTOS_BUCKET}
      Storage__PrivateDocumentsBucket: ${STORAGE_PRIVATE_DOCUMENTS_BUCKET}
      Storage__PublicPhotosBaseUrl: ${STORAGE_PUBLIC_PHOTOS_BASE_URL}
      Storage__PublicEndpoint: ${STORAGE_PUBLIC_ENDPOINT}
      Storage__PublicUseSsl: ${STORAGE_PUBLIC_USE_SSL}

      Jwt__Key: ${JWT_KEY}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}

      Email__Smtp__Host: ${SMTP_HOST}
      Email__Smtp__Port: ${SMTP_PORT}
      Email__Smtp__Username: ${SMTP_USERNAME}
      Email__Smtp__Password: ${SMTP_PASSWORD}
      Email__Smtp__FromEmail: ${SMTP_FROM_EMAIL}
      Email__Smtp__FromName: ${SMTP_FROM_NAME}
      Email__Smtp__EnableSsl: "true"

      EmailConfirmation__PublicApiBaseUrl: ${PUBLIC_API_BASE_URL}
      EmailConfirmation__FrontendResultUrl: ${FRONTEND_RESULT_URL}
      OwnerRegistration__InviteToken: ${OWNER_INVITE_TOKEN}
      ShareLinks__PublicBaseUrl: ${PUBLIC_API_BASE_URL}

      Dgis__ApiKey: ${DGIS_API_KEY}

  minio:
    image: minio/minio
    container_name: minio_practice
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
  minio-init:
    image: minio/mc
    container_name: minio_init_practice
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do sleep 2; done;
      mc mb --ignore-existing local/${STORAGE_PUBLIC_PHOTOS_BUCKET};
      mc mb --ignore-existing local/${STORAGE_PRIVATE_DOCUMENTS_BUCKET};
      mc anonymous set download local/${STORAGE_PUBLIC_PHOTOS_BUCKET};
      mc anonymous set none local/${STORAGE_PRIVATE_DOCUMENTS_BUCKET};
      exit 0;
      "
    restart: "no"
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: practice_postgres_exporter
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable"

  prometheus:
    image: prom/prometheus:latest
    container_name: practice_prometheus
    restart: unless-stopped
    depends_on:
      - postgres-exporter
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: practice_grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3010:3000"
volumes:
  postgres_data:
  minio_data:
  prometheus_data:
  grafana_data: